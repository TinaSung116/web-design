<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Work2page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    
    <link rel="stylesheet" href="./style.css" />

    <style data-tag="reset-style-sheet">
      html { line-height: 1.15; scroll-behavior: smooth; height: 100%; }
      body { margin: 0; min-height: 100%; }
      * { box-sizing: border-box; border-width: 0; border-style: solid; -webkit-font-smoothing: antialiased; }
      p, li, ul, pre, div, h1, h2, h3, h4, h5, h6, figure, blockquote, figcaption { margin: 0; padding: 0; }
      a { color: inherit; text-decoration: inherit; }
      img { display: block; }
    </style>
    
    <style>
      body {
        background-color: #F5DE9E; /* Main solid backdrop color canvas */
        display: flex;
        flex-direction: column;
      }

      /* Flex layout wrapper to cleanly center your picture asset */
      .page-canvas-wrapper {
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 40px 20px; 
      }

      /* Consistent coordinate framework boundaries */
      .canvas-frame {
        position: relative;
        width: 100%;
        max-width: 1200px; 
        top: -100px; /* Aligns natively with your layout shift settings */
      }

      /* Base layout picture presentation settings */
      .portfolio-layout-image {
        width: 100%;
        height: auto;     
        display: block;
        border-radius: 0px;
      }
    </style>
  </head>
  <body>
    <div>

      <div class="page-canvas-wrapper">
        <div class="canvas-frame">
          
          <div id="navbar-container"></div>

          <img 
            src="image/Work2.page.png" 
            alt="Work 2 Layout Page Background" 
            class="portfolio-layout-image" 
          />
          
        </div>
      </div>
    </div>

    <script src="navbar.js"></script>
  </body>
</html>
