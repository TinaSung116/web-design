<!DOCTYPE html>
<html lang="en">
  <head>
    <title>About Me Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    
    <link rel="stylesheet" href="style.css" />

    <style>
      /* Keep only page-specific container layouts inside the internal style tag */
      html { 
        height: 100%; 
        scroll-behavior: smooth; 
      }
      body { 
        margin: 0; 
        min-height: 100%; 
        background-color: #743927; 
        display: flex;
        flex-direction: column;
      }
      * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
      }

      .page-canvas-wrapper {
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 40px 20px; 
      }

      .canvas-frame {
        position: relative;
        width: 100%;
        max-width: 1200px; 
        top: -100px; 
      }

      .portfolio-layout-image {
        width: 100%;
        height: auto;     
        display: block;
        border-radius: 0px;
      }
    </style>
  </head>
  <body>

    <div class="page-canvas-wrapper">
      <div class="canvas-frame">
        
        <div id="navbar-container"></div>

        <img 
          src="/image/About Me.page.png" 
          alt="About Me Layout Page" 
          class="portfolio-layout-image" 
        />
        
      </div>
    </div>

    <script src="navbar.js"></script>
  </body>
</html>
